<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM WIKI — HUD</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="hud.css" />
</head>
<body>
</head>
<body>

<div class="hud" id="hud">
  <div class="hud-bg" id="hud-bg"></div>
  <div class="hud-vignette"></div>

  <!-- Minimap -->
  <div class="hud-el minimap-wrap">
    <div class="compass"><div class="compass-needle"></div><div class="compass-n">N</div></div>
    <div class="mm-ring" id="mm-ring">
      <img id="mm-img" src="" alt="minimap"/>
      <svg id="mm-svg" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
        <rect width="130" height="130" fill="#1a3244"/>
        <ellipse cx="65" cy="65" rx="57" ry="53" fill="#1e3d28" opacity=".68"/>
        <polygon points="28,38 70,20 104,50 90,92 36,86" fill="#23472e" opacity=".6"/>
        <path d="M6,65 Q38,55 65,65 Q92,75 124,65" stroke="#8a7a50" stroke-width="4" fill="none" opacity=".5"/>
        <path d="M65,6 Q70,38 65,65 Q60,92 65,124" stroke="#8a7a50" stroke-width="3" fill="none" opacity=".45"/>
        <rect x="43" y="43" width="14" height="10" rx="1" fill="#3a5a70" opacity=".8"/>
        <rect x="73" y="49" width="10" height="8" rx="1" fill="#3a5a70" opacity=".8"/>
        <polygon points="39,27 43.5,19 48,27" fill="#E8C873" opacity=".9"/>
        <rect x="41.5" y="27" width="4" height="7" fill="#E8C873" opacity=".9"/>
        <circle cx="65" cy="65" r="5.5" fill="#4fc3f7" stroke="white" stroke-width="2"/>
        <polygon points="65,55 61.5,61 68.5,61" fill="white" opacity=".85"/>
      </svg>
    </div>
  </div>

  <!-- Quest Tracker -->
  <div class="hud-el quest-wrap">
    <div class="quest-lbl">追蹤任務</div>
    <div id="quest-list">
      <div class="task-item active" id="q0" onclick="selQ(0)">
        <div class="task-gem lit" id="qg0"></div>
        <div><div class="task-name" id="qn0">載入中…</div><div class="task-sub"><span class="task-arr">▼</span><span id="qs0"></span></div></div>
      </div>
      <div class="task-item" id="q1" onclick="selQ(1)" style="display:none">
        <div class="task-gem" id="qg1"></div>
        <div><div class="task-name" id="qn1"></div><div class="task-sub"><span class="task-arr">▼</span><span id="qs1"></span></div></div>
      </div>
      <div class="task-item" id="q2" onclick="selQ(2)" style="display:none">
        <div class="task-gem" id="qg2"></div>
        <div><div class="task-name" id="qn2"></div><div class="task-sub"><span class="task-arr">▶</span><span id="qs2"></span></div></div>
      </div>
    </div>
  </div>

  <!-- Hotkeys -->
  <div class="hud-el hk-wrap">
    <div class="hk" id="hkb-f1" onclick="openModal('f1')"><div class="hk-ico"><img id="hki-f1" src="" alt=""/><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="20" height="20" rx="3" stroke="#E8C873" stroke-width="1.5" fill="rgba(232,200,115,0.08)"/><line x1="7" y1="9" x2="19" y2="9" stroke="#E8C873" stroke-width="1.2" stroke-linecap="round"/><line x1="7" y1="13" x2="16" y2="13" stroke="#E8C873" stroke-width="1.2" stroke-linecap="round"/><line x1="7" y1="17" x2="18" y2="17" stroke="#E8C873" stroke-width="1.2" stroke-linecap="round"/></svg><span class="hk-kb">F1</span></div><div class="hk-lbl">日誌</div></div>
    <div class="hk" id="hkb-f2" onclick="openModal('f2')"><div class="hk-ico"><img id="hki-f2" src="" alt=""/><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="10" r="4" stroke="#4fc3f7" stroke-width="1.5" fill="rgba(79,195,247,0.1)"/><circle cx="7" cy="13" r="3" stroke="#4fc3f7" stroke-width="1.2" fill="rgba(79,195,247,0.08)"/><circle cx="19" cy="13" r="3" stroke="#4fc3f7" stroke-width="1.2" fill="rgba(79,195,247,0.08)"/><path d="M5,22 Q7,17 13,17 Q19,17 21,22" stroke="#4fc3f7" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg><span class="hk-kb">F2</span><span class="hk-notif" id="f2-badge" style="display:none">0</span></div><div class="hk-lbl">大廳</div></div>
    <div class="hk" id="hkb-f3" onclick="openModal('f3')"><div class="hk-ico"><img id="hki-f3" src="" alt=""/><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="4" y="6" width="18" height="14" rx="4" stroke="#f472b6" stroke-width="1.4" fill="rgba(244,114,182,0.08)"/><circle cx="9" cy="12" r="2.5" fill="#f472b6" opacity=".8"/><circle cx="17" cy="12" r="2.5" fill="#f472b6" opacity=".8"/><line x1="4" y1="10" x2="1" y2="7" stroke="#f472b6" stroke-width="1.4" stroke-linecap="round"/><line x1="22" y1="10" x2="25" y2="7" stroke="#f472b6" stroke-width="1.4" stroke-linecap="round"/><line x1="9" y1="20" x2="9" y2="23" stroke="#f472b6" stroke-width="1.4" stroke-linecap="round"/><line x1="17" y1="20" x2="17" y2="23" stroke="#f472b6" stroke-width="1.4" stroke-linecap="round"/></svg><span class="hk-kb">F3</span></div><div class="hk-lbl">測試</div></div>
    <div class="hk" id="hkb-f4" onclick="openModal('f4')"><div class="hk-ico"><img id="hki-f4" src="" alt=""/><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><polygon points="13,3 15.5,9.5 22.5,10 17.5,14.5 19.5,21.5 13,18 6.5,21.5 8.5,14.5 3.5,10 10.5,9.5" stroke="#F5A623" stroke-width="1.3" fill="rgba(245,166,35,0.12)"/></svg><span class="hk-kb">F4</span></div><div class="hk-lbl">專案時程</div></div>
    <div class="hk" id="hkb-b" onclick="openModal('b')"><div class="hk-ico"><img id="hki-b" src="" alt=""/><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="3" y="6" width="7" height="7" rx="1" stroke="#FF4D6A" stroke-width="1.2" fill="rgba(255,77,106,0.1)"/><rect x="13" y="6" width="7" height="7" rx="1" stroke="#00C97A" stroke-width="1.2" fill="rgba(0,201,122,0.1)"/><rect x="3" y="16" width="7" height="7" rx="1" stroke="#3A7FD5" stroke-width="1.2" fill="rgba(58,127,213,0.1)"/><rect x="13" y="16" width="7" height="7" rx="1" stroke="#F5A623" stroke-width="1.2" fill="rgba(245,166,35,0.1)"/></svg><span class="hk-kb">B</span></div><div class="hk-lbl">背包</div></div>
    <div class="hk" id="hkb-f5" onclick="openModal('f5')"><div class="hk-ico"><img id="hki-f5" src="" alt=""/><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="11" cy="11" r="6" stroke="#A97FE8" stroke-width="1.5" fill="rgba(169,127,232,0.1)"/><line x1="16" y1="16" x2="22" y2="22" stroke="#A97FE8" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="11" x2="14" y2="11" stroke="#A97FE8" stroke-width="1.2" stroke-linecap="round"/><line x1="11" y1="8" x2="11" y2="14" stroke="#A97FE8" stroke-width="1.2" stroke-linecap="round"/></svg><span class="hk-kb">F5</span></div><div class="hk-lbl">圖鑑</div></div>
        <div class="hk" id="hkb-m" onclick="openModal('m')"><div class="hk-ico"><img id="hki-m" src="" alt=""/><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="9" stroke="#4ECDC4" stroke-width="1.3" fill="rgba(78,205,196,0.08)"/><ellipse cx="13" cy="13" rx="4" ry="9" stroke="#4ECDC4" stroke-width="1" fill="none"/><line x1="4" y1="13" x2="22" y2="13" stroke="#4ECDC4" stroke-width="1" stroke-dasharray="2,2"/><circle cx="13" cy="13" r="2" fill="#4ECDC4"/></svg><span class="hk-kb">M</span></div><div class="hk-lbl">地圖</div></div>
    <div class="hk" id="hkb-esc" onclick="openSettings()">
      <div class="hk-ico" style="width:40px;height:40px;border-color:rgba(148,163,184,0.35);background:rgba(30,30,40,0.6)">
        <img id="hki-esc" src="" alt=""/>
        <svg width="22" height="22" viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="9" stroke="#94a3b8" stroke-width="1.4" fill="rgba(148,163,184,0.08)"/>
          <circle cx="13" cy="13" r="3" fill="#94a3b8" opacity=".8"/>
          <circle cx="13" cy="7"  r="1.5" fill="#94a3b8" opacity=".5"/>
          <circle cx="13" cy="19" r="1.5" fill="#94a3b8" opacity=".5"/>
          <circle cx="7"  cy="13" r="1.5" fill="#94a3b8" opacity=".5"/>
          <circle cx="19" cy="13" r="1.5" fill="#94a3b8" opacity=".5"/>
        </svg>
        <span class="hk-kb" style="color:#94a3b8">ESC</span>
      </div>
      <div class="hk-lbl" style="color:rgba(148,163,184,0.65)">設定</div>
    </div>
  </div>

  <!-- Character cards -->
  <div class="hud-el char-wrap">
    <div class="cc active" onclick="selC(0)"><div class="cc-info"><div class="cc-name">開拓者</div><div class="cc-hp"><div class="cc-hp-fill" style="width:100%"></div></div></div><div class="cc-av"><img id="avi-0" src="" alt=""/><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#1e3050"/><circle cx="26" cy="18" r="10" fill="#4a6fa5" opacity=".85"/><path d="M10,52 Q26,36 42,52" fill="#3a5a80" opacity=".8"/><text x="26" y="23" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">KT</text></svg></div></div>
    <div class="cc" onclick="selC(1)"><div class="cc-info"><div class="cc-name">Alice</div><div class="cc-hp"><div class="cc-hp-fill" style="width:85%"></div></div></div><div class="cc-av"><img id="avi-1" src="" alt=""/><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#1e2840"/><circle cx="26" cy="18" r="10" fill="#5a4a80" opacity=".85"/><path d="M10,52 Q26,36 42,52" fill="#4a3a70" opacity=".8"/><text x="26" y="23" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">AL</text></svg></div></div>
    <div class="cc" onclick="selC(2)"><div class="cc-info"><div class="cc-name">Bob</div><div class="cc-hp"><div class="cc-hp-fill" style="width:62%"></div></div></div><div class="cc-av"><img id="avi-2" src="" alt=""/><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#1e2820"/><circle cx="26" cy="18" r="10" fill="#3a6040" opacity=".85"/><path d="M10,52 Q26,36 42,52" fill="#2a5030" opacity=".8"/><text x="26" y="23" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">BB</text></svg></div></div>
  </div>

  <!-- Settings Modal (ESC) -->
  <div class="modal-backdrop" id="settings-backdrop" onclick="closeSettings()" style="z-index:40"></div>
  <div id="settings-modal" style="
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0.94);
    width:min(760px,90%);max-height:82vh;
    background:rgba(6,10,20,0.98);
    border:1px solid rgba(148,163,184,0.2);
    border-radius:12px;display:flex;flex-direction:column;overflow:hidden;
    z-index:41;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;
  ">
    <div style="display:flex;align-items:center;padding:0 24px;height:52px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.3);">
      <div style="position:absolute;left:50%;transform:translateX(-50%);font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:.12em">⚙ 系統設定</div>
      <button onclick="closeSettings()" style="margin-left:auto;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>
    <div style="display:flex;flex:1;overflow:hidden;">
      <!-- 設定側欄 -->
      <div id="cfg-sidebar" style="width:160px;flex-shrink:0;background:rgba(0,0,0,0.35);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:12px 0;gap:2px;"></div>
      <!-- 設定內容區 -->
      <div id="cfg-content" style="flex:1;overflow-y:auto;padding:20px 24px;"></div>
    </div>
    <div style="display:flex;gap:10px;padding:14px 24px;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;background:rgba(0,0,0,0.2);">
      <button onclick="saveSettings()" style="flex:1;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#2a4a8a,#1e3570);color:white;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;">儲存設定</button>
      <button onclick="resetSettings()" style="padding:10px 18px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;">重設預設</button>
      <button onclick="testConnection()" style="padding:10px 18px;border-radius:8px;border:1px solid rgba(232,200,115,0.35);background:rgba(232,200,115,0.08);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;">測試連線</button>
    </div>
  </div>

  <!-- Full-screen Modal -->
  <div class="modal-backdrop" id="backdrop" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <!-- 頂部標題列 -->
    <div class="modal-header">
      <div class="modal-title" id="modal-title">背包</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <!-- 三欄主體 -->
    <div class="modal-body" id="modal-body">
      <!-- 左：分類側欄 -->
      <div class="m-sidebar" id="m-sidebar"></div>
      <!-- 中：內容區 -->
      <div class="m-content" id="m-content">
        <div class="m-toolbar" id="m-toolbar"></div>
        <div class="m-grid-wrap" id="m-grid-wrap">
          <div class="m-empty"><div class="m-empty-icon">📦</div>選擇左側分類</div>
        </div>
      </div>
      <!-- 右：詳情面板 -->
      <div class="m-detail" id="m-detail">
        <div class="m-detail-img" id="m-detail-img">
          <div class="m-detail-big-icon" id="m-detail-icon">📦</div>
        </div>
        <div class="m-detail-name-row">
          <div class="m-detail-name" id="m-detail-name">選擇一個項目</div>
          <span class="m-detail-tag" id="m-detail-tag">—</span>
        </div>
        <div class="m-detail-body" id="m-detail-body">
          <div class="m-empty" style="height:auto;padding:20px 0">
            <div style="font-size:12px;color:rgba(255,255,255,0.2)">點擊中間的項目<br>查看詳細資訊</div>
          </div>
        </div>
        <div class="m-detail-actions" id="m-detail-actions" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Upload bar -->
  <div class="upload-bar">
    <label class="up-btn" for="inp-bg">↑ 背景圖</label><input type="file" id="inp-bg" accept="image/*" onchange="upBg(event)"/>
    <label class="up-btn" for="inp-mm">↑ 雷達圖</label><input type="file" id="inp-mm" accept="image/*" onchange="upMm(event)"/>
    <button class="up-btn" onclick="toggleKeys()">↑ 換圖示 ▾</button>
    <label class="up-btn" for="inp-theme">↑ theme.json</label><input type="file" id="inp-theme" accept=".json,application/json" onchange="upTheme(event)"/>
    <button class="up-btn danger" onclick="clearAll()">清除全部</button>
  </div>
  <div class="key-row" id="key-row">
    <label class="up-btn" style="font-size:9px" for="ki-f1">F1</label><input type="file" id="ki-f1" accept="image/*" onchange="upKey(event,'f1')"/>
    <label class="up-btn" style="font-size:9px" for="ki-f2">F2</label><input type="file" id="ki-f2" accept="image/*" onchange="upKey(event,'f2')"/>
    <label class="up-btn" style="font-size:9px" for="ki-f3">F3</label><input type="file" id="ki-f3" accept="image/*" onchange="upKey(event,'f3')"/>
    <label class="up-btn" style="font-size:9px" for="ki-f4">F4</label><input type="file" id="ki-f4" accept="image/*" onchange="upKey(event,'f4')"/>
    <label class="up-btn" style="font-size:9px" for="ki-b">B</label><input type="file" id="ki-b" accept="image/*" onchange="upKey(event,'b')"/>
    <label class="up-btn" style="font-size:9px" for="ki-m">M</label><input type="file" id="ki-m" accept="image/*" onchange="upKey(event,'m')"/>
    <label class="up-btn" style="font-size:9px" for="ki-a0">角色0</label><input type="file" id="ki-a0" accept="image/*" onchange="upAv(event,0)"/>
    <label class="up-btn" style="font-size:9px" for="ki-a1">角色1</label><input type="file" id="ki-a1" accept="image/*" onchange="upAv(event,1)"/>
    <label class="up-btn" style="font-size:9px" for="ki-a2">角色2</label><input type="file" id="ki-a2" accept="image/*" onchange="upAv(event,2)"/>
  </div>

  <div class="hud-toast" id="toast"></div>
</div>


<!-- ── Scripts（載入順序：core → panels → panel-m → utils → settings）─── -->
<script src="hud-core.js"></script>
<script src="hud-panels.js"></script>
<script src="panel-m.js"></script>
<script src="hud-utils.js"></script>
<script src="hud-settings.js"></script>
</body>
</html>
